services:
  - type: web
    name: broker-analyzer-web
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_BUCKET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: broker-analyzer-redis
          property: connectionString

  - type: worker
    name: broker-analyzer-worker
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: rq worker -u $REDIS_URL csv-jobs
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_BUCKET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: broker-analyzer-redis
          property: connectionString

  - type: redis
    name: broker-analyzer-redis
    plan: starter
